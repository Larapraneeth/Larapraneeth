        <rect width="262" height="160" rx="14" fill="#0F1A2E" stroke="#1E293B"/>
        <rect width="262" height="4" rx="2" fill="#6366F1"/>
        <circle cx="238" cy="28" r="5" fill="#6366F1"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
