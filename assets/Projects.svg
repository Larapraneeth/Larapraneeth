        <rect width="262" height="4" rx="2" fill="#38BDF8"/>
        <circle cx="238" cy="28" r="5" fill="#38BDF8"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
