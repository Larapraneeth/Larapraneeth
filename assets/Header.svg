
<svg width="100%" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lara Praneeth Kondeti — AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#111A2E"/>
    </linearGradient>
    <linearGradient id="name" gradientUnits="userSpaceOnUse" x1="60" y1="0" x2="660" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.42" stop-color="#818CF8"/>
      <stop offset="0.5" stop-color="#F0F9FF"/>
      <stop offset="0.58" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#38BDF8"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-380 0; 380 0; -380 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>
  <ellipse cx="980" cy="160" rx="320" ry="220" fill="url(#glow)"/>

  <!-- ===== Agent Network ===== -->
  <g stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.5">
    <line x1="820" y1="90"  x2="940" y2="70"/>
    <line x1="820" y1="90"  x2="940" y2="150"/>
    <line x1="820" y1="160" x2="940" y2="70"/>
    <line x1="820" y1="160" x2="940" y2="150"/>
    <line x1="820" y1="160" x2="940" y2="230"/>
    <line x1="820" y1="230" x2="940" y2="150"/>
    <line x1="820" y1="230" x2="940" y2="230"/>
    <line x1="940" y1="70"  x2="1070" y2="120"/>
    <line x1="940" y1="150" x2="1070" y2="120"/>
    <line x1="940" y1="150" x2="1070" y2="200"/>
    <line x1="940" y1="230" x2="1070" y2="200"/>
  </g>

  <!-- ===== Signals firing along edges ===== -->
  <circle r="3.5" fill="#F0F9FF">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M820,90 L940,150 L1070,120"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#67E8F9">
    <animateMotion dur="2.6s" begin="0.6s" repeatCount="indefinite" path="M820,160 L940,230 L1070,200"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.6s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#A5B4FC">
    <animateMotion dur="2.4s" begin="1.1s" repeatCount="indefinite" path="M820,230 L940,150 L1070,120"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== Nodes ===== -->
  <g fill="#0EA5E9">
    <circle cx="820" cy="90" r="6"><animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="160" r="6"><animate attributeName="r" values="6;9;6" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="230" r="6"><animate attributeName="r" values="6;8;6" dur="3.4s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#6366F1">
    <circle cx="940" cy="70" r="6"><animate attributeName="r" values="6;9;6" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="940" cy="150" r="7"><animate attributeName="r" values="7;10;7" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="940" cy="230" r="6"><animate attributeName="r" values="6;8;6" dur="3.1s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#22D3EE">
    <circle cx="1070" cy="120" r="6"><animate attributeName="r" values="6;9;6" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1070" cy="200" r="6"><animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== Floating particles ===== -->
  <g fill="#38BDF8">
    <circle cx="120" cy="60" r="2"><animate attributeName="cy" values="60;50;60" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="270" r="2"><animate attributeName="cy" values="270;258;270" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="250" r="2"><animate attributeName="cy" values="250;240;250" dur="4.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== Name & Role ===== -->
  <text x="60" y="150" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="62" font-weight="700" fill="url(#name)">Lara Praneeth Kondeti</text>
  <text x="62" y="196" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="23" font-weight="500" fill="#94A3B8" letter-spacing="2">AI Engineer · Agentic AI Builder · Full Stack Developer</text>

  <!-- ===== Self-drawing accent line ===== -->
  <line x1="62" y1="220" x2="620" y2="220" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-dasharray="560" stroke-dashoffset="560">
    <animate attributeName="stroke-dashoffset" values="560;0" dur="1.6s" fill="freeze"/>
  </line>
  <circle cx="62" cy="220" r="4.5" fill="#22D3EE">
    <animateMotion dur="1.6s" fill="freeze" path="M0,0 L558,0"/>
    <animate attributeName="opacity" values="1;1;0" dur="2s" fill="freeze"/>
  </circle>

  <!-- ===== Tag chips ===== -->
  <g font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="15" font-weight="500">
    <g opacity="0"><animate attributeName="opacity" values="0;1" begin="1.4s" dur="0.5s" fill="freeze"/>
      <rect x="62" y="244" width="118" height="30" rx="15" fill="#1E293B" stroke="#334155"/>
      <text x="121" y="264" fill="#7DD3FC" text-anchor="middle">Multi-Agent AI</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" begin="1.6s" dur="0.5s" fill="freeze"/>
      <rect x="192" y="244" width="92" height="30" rx="15" fill="#1E293B" stroke="#334155"/>
      <text x="238" y="264" fill="#A5B4FC" text-anchor="middle">Deep Learning</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" begin="1.8s" dur="0.5s" fill="freeze"/>
      <rect x="296" y="244" width="64" height="30" rx="15" fill="#1E293B" stroke="#334155"/>
      <text x="328" y="264" fill="#67E8F9" text-anchor="middle">LLMs</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" begin="2s" dur="0.5s" fill="freeze"/>
      <rect x="372" y="244" width="56" height="30" rx="15" fill="#1E293B" stroke="#334155"/>
      <text x="400" y="264" fill="#7DD3FC" text-anchor="middle">RAG</text>
    </g>
  </g>
</svg>
